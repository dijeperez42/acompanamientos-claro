<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Supervisión de Terreno – Claro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f1117;--card:#1e2235;--border:rgba(255,255,255,.08);
  --text:#f0f2ff;--text2:#8b90a8;
  --red:#e60000;--green:#22c55e;--amber:#f59e0b;
  --r:12px;--rs:8px;
}
body{background:var(--bg);color:var(--text);font-family:system-ui;}
button,select,textarea,input{font-family:inherit;}

/* ===== LOGIN ===== */
#login{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:2rem;
}
.logo-wrap{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;margin-bottom:1.5rem;
}
.logo-wrap img{width:140px;height:auto;display:block;object-fit:contain;}
.logo-fallback{
  display:none;font-size:2rem;font-weight:800;
  color:var(--red);letter-spacing:2px;
}
.lcard{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:1.75rem;width:100%;
  max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.lcard label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;}
.lcard input{
  width:100%;margin-bottom:14px;padding:10px;
  border-radius:var(--rs);border:1px solid var(--border);
  background:#1a1d27;color:var(--text);font-size:14px;
}
.lcard input:focus{outline:1px solid var(--red);}

/* ===== BOTONES ===== */
.btn{
  width:100%;padding:11px;border:none;border-radius:var(--rs);
  cursor:pointer;font-size:14px;font-weight:600;
}
.bp{background:var(--red);color:#fff;transition:opacity .2s;}
.bp:hover{opacity:.85;}
.btn-back{
  background:rgba(255,255,255,.07);color:var(--text2);
  border:1px solid var(--border);margin-top:.6rem;
  width:100%;padding:11px;border-radius:var(--rs);
  cursor:pointer;font-size:14px;font-weight:600;
}
.btn-back:hover{background:rgba(255,255,255,.12);}

/* ===== APP ===== */
#app{display:none;flex-direction:column;min-height:100vh;}
.topbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
}
.topbar-btn{
  padding:6px 14px;background:rgba(255,255,255,.08);
  color:var(--text);border:1px solid var(--border);
  border-radius:var(--rs);cursor:pointer;font-size:13px;font-weight:600;
}
.content{flex:1;padding:1rem;overflow-y:auto;}

/* ===== NAV INFERIOR ===== */
.bnav{display:flex;background:var(--card);border-top:1px solid var(--border);}
.ni{
  flex:1;padding:12px 4px;background:none;border:none;
  color:var(--text2);cursor:pointer;font-size:12px;
}
.ni.active{color:var(--red);font-weight:700;border-top:2px solid var(--red);}

/* ===== CARDS ===== */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.75rem;}
.stat{font-size:2rem;font-weight:700;margin:.25rem 0;}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.bg{background:rgba(34,197,94,.15);color:var(--green);}
.ba{background:rgba(245,158,11,.15);color:var(--amber);}
.br{background:rgba(239,68,68,.15);color:var(--red);}

select,textarea{
  width:100%;margin-top:6px;margin-bottom:14px;padding:10px;
  border-radius:var(--rs);border:1px solid var(--border);
  background:#1a1d27;color:var(--text);font-size:14px;
}
textarea{resize:vertical;min-height:80px;}
</style>
</head>

  <div class="lcard">

    <label>Contrasena</label>

<!-- ===== APP ===== -->
<div id="app">
  <div class="topbar">
    <button class="topbar-btn" onclick="goBack()" title="Volver a Inicio">&#8592; Inicio</button>
    <strong id="userTitle" style="font-size:13px;"></strong>
    <button class="topbar-btn" onclick="logout()">Salir</button>
  </div>

  <div class="content" id="content"></div>

  <div class="bnav">
    <button class="ni active" id="btn-home"  onclick="go('home',  event)">Inicio</button>
    <button class="ni"        id="btn-new"   onclick="go('new',   event)">Nuevo</button>
    <button class="ni"        id="btn-list"  onclick="go('list',  event)">Registros</button>
    <button class="ni"        id="btn-excel" onclick="exportExcel()">Excel</button>
    <button class="ni"        id="btn-stats" onclick="go('stats', event)">Estadisticas</button>
  </div>
</div>

<script>
/* ===== DATOS ===== */
const VENDEDORES = {
  hugo:     ["Cisterna Camila","Rodriguez Maria Del Rosario","Santana Mayra Belen",
             "Marcelo Mussatti","Albornoz Andres","Castro Mauro","Calvo Sofia Giselle","Hidalgo Eduardo"],
  bernarda: ["Garcia Ignacio Ariel","Alma Gloria Eliana","Picon Pamela Belen",
             "Garcia Angeles Ivonne","Rivero Beatriz","Araya Fernando","Veron Romina",
             "Ruiz Luz Martina","Toro Fabian","Guevara Hugo","Cisterna Noelia"],
  franco:   ["Pia Ferrari","Jose Galvan","Joaquin Pringles","Josue Elizondo"]
};

const CREDENCIALES = {
  diego:    { pass:"claro2024",    key:"claro"    },
  hugo:     { pass:"hugo2024",     key:"hugo"     },
  bernarda: { pass:"bernarda2024", key:"bernarda" },
  franco:   { pass:"franco2024",   key:"franco"   }
};

const NOMBRES = {
  claro:    "Supervisor Claro - Diego Perez",
  hugo:     "Supervisor Terreno - Hugo Orelo",
  bernarda: "Supervisor Terreno - Bernarda Ponce",
  franco:   "Supervisor Terreno - Franco Tolaba"
};

let USER = null;
let DATA = JSON.parse(localStorage.getItem("registros_claro") || "[]");

/* ===== LOGIN / LOGOUT ===== */
function login(){
  const u    = document.getElementById("userInput").value.trim().toLowerCase();
  const pass = document.getElementById("passInput").value;
  const cred = CREDENCIALES[u];
  if(!cred || cred.pass !== pass){ alert("Usuario o contrasena incorrectos"); return; }

  USER = cred.key;
  const esClaro = USER === "claro";

  // Solo Supervisor Claro ve Excel y Estadisticas
  document.getElementById("btn-excel").style.display = esClaro ? "" : "none";
  document.getElementById("btn-stats").style.display = esClaro ? "" : "none";

  document.getElementById("userTitle").textContent = NOMBRES[USER];
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display    = "flex";

  setActive("btn-home");
  renderHome();
}

function logout(){
  USER = null;
  document.getElementById("userInput").value = "";
  document.getElementById("passInput").value = "";
  document.getElementById("app").style.display   = "none";
  document.getElementById("login").style.display = "flex";
}

/* ===== NAV ===== */
function setActive(id){
  document.querySelectorAll(".ni").forEach(function(b){ b.classList.remove("active"); });
  var el = document.getElementById(id);
  if(el) el.classList.add("active");
}

function go(view, evt){
  if(evt && evt.currentTarget){
    document.querySelectorAll(".ni").forEach(function(b){ b.classList.remove("active"); });
    evt.currentTarget.classList.add("active");
  }
  if(view === "home")  renderHome();
  if(view === "new")   renderNew();
  if(view === "list")  renderList();
  if(view === "stats") renderStats();
}

function goBack(){
  setActive("btn-home");
  renderHome();
}

/* ===== INICIO ===== */
function renderHome(){
  var v  = DATA.filter(function(r){ return USER === "claro" || r.sup === USER; });
  var b  = v.filter(function(r){ return r.res === "Bueno"; }).length;
  var re = v.filter(function(r){ return r.res === "Regular"; }).length;
  var m  = v.filter(function(r){ return r.res === "Malo"; }).length;

  document.getElementById("content").innerHTML =
    '<div class="card">' +
      '<div style="color:var(--text2);font-size:13px;margin-bottom:.5rem;">Total registros</div>' +
      '<div class="stat">' + v.length + '</div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;">' +
      '<div class="card" style="text-align:center;"><div class="badge bg">Bueno</div><div class="stat" style="color:var(--green)">' + b + '</div></div>' +
      '<div class="card" style="text-align:center;"><div class="badge ba">Regular</div><div class="stat" style="color:var(--amber)">' + re + '</div></div>' +
      '<div class="card" style="text-align:center;"><div class="badge br">Malo</div><div class="stat" style="color:var(--red)">' + m + '</div></div>' +
    '</div>';
}

/* ===== NUEVO ===== */
function pregunta(id, texto){
  return '<div style="margin-bottom:1rem;">' +
    '<div style="font-size:13px;color:var(--text);margin-bottom:6px;line-height:1.4;">' + texto + '</div>' +
    '<div style="display:flex;gap:.5rem;margin-bottom:6px;">' +
      '<label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text2);cursor:pointer;">' +
        '<input type="radio" name="' + id + '" value="Si" style="accent-color:var(--red);width:auto;margin:0;"> Si' +
      '</label>' +
      '<label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text2);cursor:pointer;">' +
        '<input type="radio" name="' + id + '" value="No" style="accent-color:var(--red);width:auto;margin:0;"> No' +
      '</label>' +
    '</div>' +
    '<textarea id="' + id + '" placeholder="Detalle (opcional)..." style="margin-bottom:0;min-height:52px;font-size:13px;"></textarea>' +
  '</div>';
}

function renderNew(){
  var vends = USER === "claro"
    ? Object.values(VENDEDORES).reduce(function(a,b){ return a.concat(b); }, [])
    : VENDEDORES[USER];

  var opts = vends.map(function(x){ return '<option>' + x + '</option>'; }).join("");

  document.getElementById("content").innerHTML =
    '<div class="card">' +
      '<label style="font-size:12px;color:var(--text2);">Vendedor</label>' +
      '<select id="v">' + opts + '</select>' +

      '<div style="height:1px;background:var(--border);margin:.5rem 0 1rem;"></div>' +
      '<div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.75rem;">Preguntas al cliente</div>' +

      pregunta('q1', '1. ¿Qué prestador de servicio tenés actualmente?') +
      pregunta('q2', '2. ¿Para qué usan internet hoy?') +
      pregunta('q3', '3. ¿Tenés problemas de velocidad o estabilidad en algún momento del día?') +
      pregunta('q4', '4. ¿Estás conforme con lo que pagás hoy por el servicio?') +
      pregunta('q5', '5. Las líneas móviles, ¿con qué operador las tienen?') +
      pregunta('q6', '6. ¿Quiénes usan el servicio y con qué planes?') +
      pregunta('q7', '7. ¿Están bien con los planes? ¿Les alcanzan los megas o tienen que hacer recargas?') +

      '<div style="height:1px;background:var(--border);margin:.5rem 0 1rem;"></div>' +
      '<label style="font-size:12px;color:var(--text2);">Resultado de la visita</label>' +
      '<select id="r"><option>Bueno</option><option>Regular</option><option>Malo</option></select>' +

      '<label style="font-size:12px;color:var(--text2);">Observaciones generales</label>' +
      '<textarea id="o" placeholder="Escribi tus observaciones..."></textarea>' +

      '<button class="btn bp" onclick="save()">Guardar</button>' +
      '<button class="btn-back" onclick="goBack()">Atras</button>' +
    '</div>';
}

/* ===== REGISTROS ===== */
var QLABELS = [
  '1. Prestador actual',
  '2. Uso de internet',
  '3. Problemas velocidad/estabilidad',
  '4. Conforme con lo que paga',
  '5. Operador lineas moviles',
  '6. Usuarios y planes',
  '7. Alcanzan los megas / recargas'
];

function renderList(){
  var v = DATA.filter(function(r){ return USER === "claro" || r.sup === USER; });
  if(v.length === 0){
    document.getElementById("content").innerHTML =
      '<div class="card" style="color:var(--text2);text-align:center;">Sin registros aun</div>';
    return;
  }
  var html = v.slice().reverse().map(function(r){
    var cls = r.res==="Bueno"?"bg":r.res==="Regular"?"ba":"br";
    var pregs = "";
    if(r.p){
      pregs = '<div style="margin-top:.75rem;border-top:1px solid var(--border);padding-top:.75rem;">';
      for(var i=1;i<=7;i++){
        var q = r.p["q"+i];
        if(q){
          pregs += '<div style="margin-bottom:.4rem;">' +
            '<div style="font-size:11px;color:var(--text2);">' + QLABELS[i-1] + '</div>' +
            '<div style="font-size:13px;">' +
              '<span style="font-weight:600;color:' + (q.resp==="Si"?"var(--green)":q.resp==="No"?"var(--red)":"var(--text2)") + '">' + q.resp + '</span>' +
              (q.det ? ' — ' + q.det : '') +
            '</div>' +
          '</div>';
        }
      }
      pregs += '</div>';
    }
    return '<div class="card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;">' +
        '<strong>' + r.v + '</strong>' +
        '<span class="badge ' + cls + '">' + r.res + '</span>' +
      '</div>' +
      '<div style="font-size:12px;color:var(--text2);">' + r.f + ' - ' + r.sup + '</div>' +
      (r.o ? '<div style="margin-top:.4rem;font-size:13px;">' + r.o + '</div>' : '') +
      pregs +
    '</div>';
  }).join("");
  document.getElementById("content").innerHTML = html;
}

/* ===== GUARDAR ===== */
function getRadio(name){
  var sel = document.querySelector('input[name="' + name + '"]:checked');
  return sel ? sel.value : "-";
}
function getVal(id){
  var el = document.getElementById(id);
  return el ? el.value : "";
}

function save(){
  var v = document.getElementById("v");
  var r = document.getElementById("r");
  if(!v || !r) return;

  var preguntas = {
    q1: { resp: getRadio('q1'), det: getVal('q1') },
    q2: { resp: getRadio('q2'), det: getVal('q2') },
    q3: { resp: getRadio('q3'), det: getVal('q3') },
    q4: { resp: getRadio('q4'), det: getVal('q4') },
    q5: { resp: getRadio('q5'), det: getVal('q5') },
    q6: { resp: getRadio('q6'), det: getVal('q6') },
    q7: { resp: getRadio('q7'), det: getVal('q7') }
  };

  DATA.push({
    f:   new Date().toLocaleDateString("es-AR"),
    sup: USER,
    v:   v.value,
    res: r.value,
    o:   getVal('o'),
    p:   preguntas
  });
  localStorage.setItem("registros_claro", JSON.stringify(DATA));
  setActive("btn-home");
  renderHome();
}

/* ===== ESTADISTICAS (solo Supervisor Claro) ===== */

// Calcula % de acierto a las 7 preguntas (Si=positivo, No=negativo)
// Las preguntas "negativas" donde Si es malo: q3 (problemas), q7 (no alcanzan megas)
var PREGUNTAS_NEGATIVAS = { q3: true, q7: true };

function calcAcierto(r){
  if(!r.p) return null;
  var respondidas = 0, aciertos = 0;
  for(var i=1;i<=7;i++){
    var q = r.p["q"+i];
    if(!q || q.resp==="-") continue;
    respondidas++;
    var esNegativa = PREGUNTAS_NEGATIVAS["q"+i];
    if(esNegativa){
      if(q.resp==="No") aciertos++; // No tener problemas = bueno
    } else {
      if(q.resp==="Si") aciertos++; // Si conforme, si tiene = bueno
    }
  }
  return respondidas > 0 ? Math.round(aciertos/respondidas*100) : null;
}

function scoreColor(pct){
  return pct >= 70 ? "var(--green)" : pct >= 40 ? "var(--amber)" : "var(--red)";
}

function barraAcierto(pct){
  var color = scoreColor(pct);
  return '<div style="display:flex;align-items:center;gap:.5rem;margin-top:4px;">' +
    '<div style="flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,.07);overflow:hidden;">' +
      '<div style="width:'+pct+'%;height:100%;background:'+color+';border-radius:4px;transition:width .5s;"></div>' +
    '</div>' +
    '<span style="font-size:12px;font-weight:700;color:'+color+';min-width:36px;text-align:right;">'+pct+'%</span>' +
  '</div>';
}

function renderStats(){
  if(USER !== "claro") return;

  var SUPS = [
    { key:"hugo",     label:"Hugo Orelo" },
    { key:"bernarda", label:"Bernarda Ponce" },
    { key:"franco",   label:"Franco Tolaba" }
  ];

  var total = DATA.length;
  var gB = DATA.filter(function(r){ return r.res==="Bueno"; }).length;
  var gR = DATA.filter(function(r){ return r.res==="Regular"; }).length;
  var gM = DATA.filter(function(r){ return r.res==="Malo"; }).length;

  // ── Cards por supervisor (resumen resultado + detalle vendedor) ──
  var supCards = SUPS.map(function(s){
    var rows = DATA.filter(function(r){ return r.sup === s.key; });
    var n  = rows.length;
    var b  = rows.filter(function(r){ return r.res==="Bueno"; }).length;
    var re = rows.filter(function(r){ return r.res==="Regular"; }).length;
    var m  = rows.filter(function(r){ return r.res==="Malo"; }).length;
    var pB = n ? Math.round(b/n*100)  : 0;
    var pR = n ? Math.round(re/n*100) : 0;
    var pM = n ? Math.round(m/n*100)  : 0;
    var score = n ? Math.round((b + re*0.5) / n * 100) : 0;
    var sc = score>=70?"var(--green)":score>=40?"var(--amber)":"var(--red)";

    // Agrupar registros por vendedor
    var vendMap = {};
    rows.forEach(function(r){
      if(!vendMap[r.v]) vendMap[r.v] = [];
      vendMap[r.v].push(r);
    });

    var vendRows = Object.keys(vendMap).map(function(vname){
      var vrows = vendMap[vname];
      // Ultimo acompañamiento
      var ultimo = vrows[vrows.length-1];
      // Promedio de acierto de todos sus registros
      var aciertoVals = vrows.map(calcAcierto).filter(function(x){ return x !== null; });
      var avgAcierto = aciertoVals.length
        ? Math.round(aciertoVals.reduce(function(a,b){ return a+b; },0)/aciertoVals.length)
        : null;

      var aciertoHtml = avgAcierto !== null
        ? barraAcierto(avgAcierto)
        : '<span style="font-size:11px;color:var(--text2);">Sin preguntas</span>';

      return '<div style="padding:.6rem 0;border-bottom:1px solid var(--border);">' +
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
          '<div style="font-size:13px;font-weight:600;flex:1;">' + vname + '</div>' +
          '<div style="font-size:11px;color:var(--text2);text-align:right;white-space:nowrap;margin-left:.5rem;">' +
            vrows.length + ' eval. · ' + ultimo.f +
          '</div>' +
        '</div>' +
        aciertoHtml +
      '</div>';
    }).join("");

    return '<div class="card" style="margin-bottom:.75rem;">' +
      // Cabecera supervisor
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">' +
        '<div>' +
          '<div style="font-weight:700;font-size:15px;">' + s.label + '</div>' +
          '<div style="font-size:12px;color:var(--text2);">' + n + ' acompañamiento' + (n!==1?"s":"") + '</div>' +
        '</div>' +
        '<div style="text-align:right;">' +
          '<div style="font-size:11px;color:var(--text2);">Score gral.</div>' +
          '<div style="font-size:1.6rem;font-weight:800;color:'+sc+';line-height:1;">' + score + '%</div>' +
        '</div>' +
      '</div>' +
      // Barra resultado
      '<div style="height:10px;border-radius:5px;overflow:hidden;display:flex;margin-bottom:.6rem;background:rgba(255,255,255,.05);">' +
        (pB?'<div style="width:'+pB+'%;background:var(--green);"></div>':"") +
        (pR?'<div style="width:'+pR+'%;background:var(--amber);"></div>':"") +
        (pM?'<div style="width:'+pM+'%;background:var(--red);"></div>':"") +
      '</div>' +
      '<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem;">' +
        '<span class="badge bg">'+b+' Bueno'+(b!==1?"s":"")+'</span>' +
        '<span class="badge ba">'+re+' Regular'+(re!==1?"es":"")+'</span>' +
        '<span class="badge br">'+m+' Malo'+(m!==1?"s":"")+'</span>' +
      '</div>' +
      // Detalle vendedores
      '<div style="border-top:1px solid var(--border);padding-top:.5rem;">' +
        '<div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.25rem;">Acierto por vendedor</div>' +
        (n === 0
          ? '<div style="font-size:13px;color:var(--text2);">Sin registros</div>'
          : vendRows) +
      '</div>' +
    '</div>';
  }).join("");

  // SVG grafico barras apiladas por supervisor
  var maxN = 1;
  SUPS.forEach(function(s){
    var n = DATA.filter(function(r){ return r.sup===s.key; }).length;
    if(n > maxN) maxN = n;
  });
  var barW=54, gap=24, svgW=SUPS.length*(barW+gap)+gap, svgH=130;

  var svgBars = SUPS.map(function(s, i){
    var rows = DATA.filter(function(r){ return r.sup===s.key; });
    var n  = rows.length;
    var b  = rows.filter(function(r){ return r.res==="Bueno"; }).length;
    var re = rows.filter(function(r){ return r.res==="Regular"; }).length;
    var m  = rows.filter(function(r){ return r.res==="Malo"; }).length;
    var x  = gap + i*(barW+gap);
    var maxH = svgH-30, yBase = svgH-18;
    var hB = n?Math.round(b/maxN*maxH):0;
    var hR = n?Math.round(re/maxN*maxH):0;
    var hM = n?Math.round(m/maxN*maxH):0;
    var totalH = hB+hR+hM;
    var firstName = s.label.split(" ")[0];
    return '<g>' +
      (hM?'<rect x="'+x+'" y="'+(yBase-totalH)+'" width="'+barW+'" height="'+hM+'" fill="#e60000" rx="3"/>':"") +
      (hR?'<rect x="'+x+'" y="'+(yBase-totalH+hM)+'" width="'+barW+'" height="'+hR+'" fill="#f59e0b"/>':"") +
      (hB?'<rect x="'+x+'" y="'+(yBase-hB)+'" width="'+barW+'" height="'+hB+'" fill="#22c55e"/>':"") +
      (!totalH?'<rect x="'+x+'" y="'+(yBase-4)+'" width="'+barW+'" height="4" fill="rgba(255,255,255,.1)" rx="2"/>':"") +
      '<text x="'+(x+barW/2)+'" y="'+(svgH-2)+'" text-anchor="middle" fill="#8b90a8" font-size="11" font-family="system-ui">'+firstName+'</text>' +
      (n?'<text x="'+(x+barW/2)+'" y="'+(yBase-totalH-5)+'" text-anchor="middle" fill="#f0f2ff" font-size="11" font-weight="700" font-family="system-ui">'+n+'</text>':"") +
    '</g>';
  }).join("");

  document.getElementById("content").innerHTML =
    // Resumen global
    '<div class="card">' +
      '<div style="color:var(--text2);font-size:12px;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.5px;">Resumen global</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.4rem;text-align:center;">' +
        '<div><div style="font-size:1.4rem;font-weight:800;">'+total+'</div><div style="font-size:10px;color:var(--text2);">Total</div></div>' +
        '<div><div style="font-size:1.4rem;font-weight:800;color:var(--green);">'+gB+'</div><div style="font-size:10px;color:var(--text2);">Buenos</div></div>' +
        '<div><div style="font-size:1.4rem;font-weight:800;color:var(--amber);">'+gR+'</div><div style="font-size:10px;color:var(--text2);">Regulares</div></div>' +
        '<div><div style="font-size:1.4rem;font-weight:800;color:var(--red);">'+gM+'</div><div style="font-size:10px;color:var(--text2);">Malos</div></div>' +
      '</div>' +
    '</div>' +
    // Grafico
    '<div class="card">' +
      '<div style="color:var(--text2);font-size:12px;margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.5px;">Acompanamientos por supervisor</div>' +
      '<svg viewBox="0 0 '+svgW+' '+svgH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">'+svgBars+'</svg>' +
      '<div style="display:flex;gap:1rem;justify-content:center;margin-top:.6rem;flex-wrap:wrap;">' +
        '<span style="font-size:11px;color:var(--green);">■ Bueno</span>' +
        '<span style="font-size:11px;color:var(--amber);">■ Regular</span>' +
        '<span style="font-size:11px;color:var(--red);">■ Malo</span>' +
      '</div>' +
    '</div>' +
    // Cards supervisor + vendedores
    '<div style="color:var(--text2);font-size:12px;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.5px;">Detalle por supervisor y vendedor</div>' +
    supCards +
    (DATA.length===0?'<div class="card" style="color:var(--text2);text-align:center;">Sin datos aun.</div>':"");
}

/* ===== EXCEL ===== */
function exportExcel(){
  if(USER !== "claro") return;

  var SUPS = [
    { key:"hugo",     label:"Hugo Orelo" },
    { key:"bernarda", label:"Bernarda Ponce" },
    { key:"franco",   label:"Franco Tolaba" }
  ];

  // Hoja 1: registros detallados
  var h = "<table border='1'><tr style='background:#333;color:#fff;'>" +
    "<th>Fecha</th><th>Supervisor Terreno</th><th>Vendedor</th><th>Resultado</th>" +
    "<th>% Acierto Preguntas</th><th>Observaciones</th>" +
    "<th>1.Prestador actual</th><th>2.Uso de internet</th><th>3.Problemas velocidad</th>" +
    "<th>4.Conforme con precio</th><th>5.Operador movil</th><th>6.Usuarios y planes</th>" +
    "<th>7.Alcanzan megas</th>" +
  "</tr>";

  // Ordenar por supervisor
  SUPS.forEach(function(s){
    var rows = DATA.filter(function(r){ return r.sup === s.key; });
    rows.forEach(function(r){
      var rc = r.res==="Bueno"?"#a8d08d":r.res==="Regular"?"#ffe699":"#f4b084";
      var p = r.p || {};
      var acierto = calcAcierto(r);
      var ac = acierto !== null ? acierto : "-";
      var acColor = acierto===null?"":acierto>=70?"#a8d08d":acierto>=40?"#ffe699":"#f4b084";
      function cell(q){ return q ? (q.resp + (q.det ? " - "+q.det : "")) : "-"; }
      h += "<tr>" +
        "<td>" + r.f + "</td>" +
        "<td>" + s.label + "</td>" +
        "<td><b>" + r.v + "</b></td>" +
        "<td style='background:"+rc+";text-align:center;'>" + r.res + "</td>" +
        "<td style='background:"+acColor+";text-align:center;font-weight:bold;'>" + (acierto!==null?ac+"%":"-") + "</td>" +
        "<td>" + (r.o||"") + "</td>" +
        "<td>" + cell(p.q1) + "</td><td>" + cell(p.q2) + "</td><td>" + cell(p.q3) + "</td>" +
        "<td>" + cell(p.q4) + "</td><td>" + cell(p.q5) + "</td><td>" + cell(p.q6) + "</td>" +
        "<td>" + cell(p.q7) + "</td>" +
      "</tr>";
    });
    // Fila separadora entre supervisores
    if(rows.length > 0){
      h += "<tr><td colspan='13' style='background:#1a1a2e;color:#aaa;font-style:italic;padding:4px 8px;'>" +
        "--- Fin registros " + s.label + " ---" +
      "</td></tr>";
    }
  });
  h += "</table>";

  // Hoja 2: resumen por vendedor
  h += "<br><br><table border='1'><tr style='background:#333;color:#fff;'>" +
    "<th>Supervisor Terreno</th><th>Vendedor</th><th>N° Evaluaciones</th>" +
    "<th>Ultima Evaluacion</th><th>% Acierto Promedio</th><th>Buenos</th><th>Regulares</th><th>Malos</th>" +
  "</tr>";

  SUPS.forEach(function(s){
    var rows = DATA.filter(function(r){ return r.sup === s.key; });
    // Agrupar por vendedor
    var vendMap = {};
    rows.forEach(function(r){
      if(!vendMap[r.v]) vendMap[r.v] = [];
      vendMap[r.v].push(r);
    });
    Object.keys(vendMap).sort().forEach(function(vname){
      var vrows = vendMap[vname];
      var ultimo = vrows[vrows.length-1];
      var acVals = vrows.map(calcAcierto).filter(function(x){ return x !== null; });
      var avgAc  = acVals.length ? Math.round(acVals.reduce(function(a,b){return a+b;},0)/acVals.length) : null;
      var acColor = avgAc===null?"":avgAc>=70?"#a8d08d":avgAc>=40?"#ffe699":"#f4b084";
      var vB = vrows.filter(function(r){return r.res==="Bueno";}).length;
      var vR = vrows.filter(function(r){return r.res==="Regular";}).length;
      var vM = vrows.filter(function(r){return r.res==="Malo";}).length;
      h += "<tr>" +
        "<td>" + s.label + "</td>" +
        "<td><b>" + vname + "</b></td>" +
        "<td style='text-align:center;'>" + vrows.length + "</td>" +
        "<td style='text-align:center;'>" + ultimo.f + "</td>" +
        "<td style='background:"+acColor+";text-align:center;font-weight:bold;'>" + (avgAc!==null?avgAc+"%":"-") + "</td>" +
        "<td style='background:#a8d08d;text-align:center;'>" + vB + "</td>" +
        "<td style='background:#ffe699;text-align:center;'>" + vR + "</td>" +
        "<td style='background:#f4b084;text-align:center;'>" + vM + "</td>" +
      "</tr>";
    });
  });
  h += "</table>";

  var blob = new Blob([h], {type:"application/vnd.ms-excel"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "acompanamientos_claro.xls";
  a.click();
}
</script>
