<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Supervisión de Terreno – Claro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  
logo-wrap img {
  width: 120px;
  display: block;
  margin: 0 auto 16px;
}

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f1117;--card:#1e2235;--border:rgba(255,255,255,.08);
  --text:#f0f2ff;--text2:#8b90a8;
  --red:#e60000;--green:#22c55e;--amber:#f59e0b;
  --r:12px;--rs:8px;
}
body{background:var(--bg);color:var(--text);font-family:system-ui;}
button,select,textarea{font-family:inherit;}
.hide{display:none;}

#login,#app{min-height:100vh;}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.logo-wrap img{width:120px;margin-bottom:1rem;}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;width:100%;max-width:360px;}
label{font-size:12px;color:var(--text2);}
select,textarea{width:100%;margin-top:6px;margin-bottom:14px;padding:10px;border-radius:var(--rs);border:1px solid var(--border);background:#1a1d27;color:var(--text);}
.btn{padding:10px;border:none;border-radius:var(--rs);cursor:pointer;}
.bp{background:var(--red);color:#fff;}

#app{display:none;flex-direction:column;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px;display:flex;justify-content:space-between;align-items:center;}
.content{flex:1;padding:1rem;}
.bnav{display:flex;background:var(--card);border-top:1px solid var(--border);}
.ni{flex:1;padding:10px;background:none;border:none;color:var(--text2);cursor:pointer;}
.ni.active{color:var(--red);font-weight:600;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:.75rem;}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;}
.bg{background:rgba(34,197,94,.15);color:var(--green);}
.ba{background:rgba(245,158,11,.15);color:var(--amber);}
.br{background:rgba(239,68,68,.15);color:var(--red);}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="logo-wrap">
    <img src="./logo-claro.png" alt="Claro Logo">
  </div>

  <div class="lcard">
    <label>Usuario</label>
    <select id="userSel">
      <option value="">— seleccionar —</option>
      <option value="claro">Supervisor Claro — Diego Perez</option>
      <option value="hugo">Supervisor Terreno — Hugo Orelo</option>
      <option value="bernarda">Supervisor Terreno — Bernarda Ponce</option>
      <option value="franco">Supervisor Terreno — Franco Tolaba</option>
    </select>
    <button class="btn bp" onclick="login()">Ingresar</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <strong id="userTitle"></strong>
    <button class="btn" onclick="logout()">Salir</button>
  </div>

  <div class="content" id="content"></div>

  <div class="bnav">
    <button class="ni active" onclick="go('home')">Inicio</button>
    <button class="ni" onclick="go('new')">Nuevo</button>
    <button class="ni" onclick="go('list')">Registros</button>
    <button class="ni" onclick="exportExcel()">Excel</button>
  </div>
</div>

<script>
/* ===== DATOS ===== */
const VENDEDORES = {
  hugo:["Cisterna Camila","Rodriguez Maria Del Rosario","Santana Mayra Belen","Marcelo Mussatti","Albornoz Andres","Castro Mauro","Calvo Sofia Giselle","Hidalgo Eduardo"],
  bernarda:["Garcia Ignacio Ariel","Alma Gloria Eliana","Picon Pamela Belen","Garcia Angeles Ivonne","Rivero Beatriz","Araya Fernando","Veron Romina","Ruiz Luz Martina","Toro Fabian","Guevara Hugo","Cisterna Noelia"],
  franco:["Pia Ferrari","José Galván","Joaquín Pringles","Josué Elizondo"]
};

let USER=null;
let DATA=JSON.parse(localStorage.getItem("registros_claro")||"[]");

/* ===== LOGIN ===== */
function login(){
  const u=document.getElementById("userSel").value;
  if(!u) return alert("Seleccioná un usuario");
  USER=u;
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="flex";
  document.getElementById("userTitle").textContent =
    u==="claro" ? "Supervisor Claro — Diego Perez" : "Supervisor Terreno — "+u.toUpperCase();
  go("home");
}

function logout(){
  USER=null;
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="flex";
}

/* ===== NAV ===== */
function go(view){
  document.querySelectorAll(".ni").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  if(view==="home") renderHome();
  if(view==="new") renderNew();
  if(view==="list") renderList();
}

/* ===== VISTAS ===== */
function renderHome(){
  const v=DATA.filter(r=>USER==="claro"||r.sup===USER);
  content.innerHTML=`
    <div class="card">
      Total registros: ${v.length}<br>
      🟢 ${v.filter(r=>r.res==="Bueno").length}
      🟡 ${v.filter(r=>r.res==="Regular").length}
      🔴 ${v.filter(r=>r.res==="Malo").length}
    </div>`;
}

function renderNew(){
  const vends = USER==="claro"
    ? Object.values(VENDEDORES).flat()
    : VENDEDORES[USER];

  content.innerHTML=`
    <div class="card">
      <label>Vendedor</label>
      <select id="v">${vends.map(x=>`<option>${x}</option>`).join("")}</select>

      <label>Resultado</label>
      <select id="r"><option>Bueno</option><option>Regular</option><option>Malo</option></select>

      <label>Observaciones</label>
      <textarea id="o"></textarea>

      <button class="btn bp" onclick="save()">Guardar</button>
    </div>`;
}

function renderList(){
  const v=DATA.filter(r=>USER==="claro"||r.sup===USER);
  content.innerHTML=v.map(r=>`
    <div class="card">
      <strong>${r.v}</strong><br>
      <span class="badge ${r.res==="Bueno"?"bg":r.res==="Regular"?"ba":"br"}">${r.res}</span>
    </div>`).join("");
}

/* ===== GUARDAR ===== */
function save(){
  DATA.push({
    f:new Date().toLocaleDateString(),
    sup:USER==="claro"?"claro":USER,
    v:document.getElementById("v").value,
    res:document.getElementById("r").value,
    o:document.getElementById("o").value
  });
  localStorage.setItem("registros_claro",JSON.stringify(DATA));
  go("home");
}

/* ===== EXCEL ===== */
function exportExcel(){
  let h="<table border='1'><tr><th>Fecha</th><th>Supervisor</th><th>Vendedor</th><th>Resultado</th><th>Obs</th></tr>";
  DATA.forEach(r=>{
    const c=r.res==="Bueno"?"#a8d08d":r.res==="Regular"?"#ffe699":"#f4b084";
    h+=`<tr><td>${r.f}</td><td>${r.sup}</td><td>${r.v}</td><td style="background:${c}">${r.res}</td><td>${r.o}</td></tr>`;
  });
  h+="</table>";
  const b=new Blob([h],{type:"application/vnd.ms-excel"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download="acompanamientos_claro.xls";
  a.click();
}
</script>

</body>
</html>
